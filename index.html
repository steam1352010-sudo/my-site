<!-- index.html -->
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="BrowseBook - مشروع اجتماعي تعليمي تجريبي">
<meta name="robots" content="noindex,nofollow">
<title>BrowseBook</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="topbar">
    <div class="logo">BrowseBook</div>

    <div class="topbar-center">
      <input
        type="text"
        id="friendSearch"
        class="search-input"
        placeholder="ابحث عن الأصدقاء..."
        oninput="handleSearchInput(this.value)"
      >
      <div id="searchResults" class="search-results"></div>
    </div>

    <div id="topbarUser" class="topbar-user"></div>
  </div>


  <div id="loginScreen" class="screen login-box box">
    <h3>دخول إلى BrowseBook</h3>
    <p id="loginError" class="error"></p>
    <input type="text" id="loginUsername" placeholder="اسم المستخدم">
    <input type="password" id="loginPassword" placeholder="رمز الدخول">
    <button onclick="handleLogin()">دخول</button>
    <p class="switch-link">ليس لديك حساب؟ <a onclick="showScreen('registerScreen')">إنشاء حساب جديد</a></p>
  </div>

  <div id="registerScreen" class="screen login-box box" style="display:none;">
    <h3>إنشاء حساب في BrowseBook</h3>
    <p id="registerError" class="error"></p>
    <input type="text" id="registerName" placeholder="الاسم الكامل">
    <input type="text" id="registerUsername" placeholder="اسم المستخدم">
    <input type="email" id="registerEmail" placeholder="البريد الإلكتروني">
    <input type="password" id="registerPassword" placeholder="رمز الدخول">
    <input type="file" id="registerAvatar" accept="image/*">
    <textarea id="registerBio" rows="3" placeholder="اكتب سيرة ذاتية قصيرة..."></textarea>
    <button onclick="handleRegister()">إنشاء حساب</button>
    <p class="switch-link">لديك حساب؟ <a onclick="showScreen('loginScreen')">تسجيل الدخول</a></p>
  </div>

  <!-- باقي الصفحة كما هو عندك -->

  <footer class="site-footer">
    كل الحقوق محفوظة لموقع BrowseBook 2026
  </footer>

  <script src="app.js"></script>
</body>
</html>
